name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }} zip
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: intel
            runner: macos-13
          - arch: apple-silicon
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app
        run: pyinstaller --noconfirm --clean macos.spec

      - name: Rename app
        run: mv "dist/MofangVoiceProcessor.app" "dist/魔方原声处理.app"

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent "dist/魔方原声处理.app" "魔方原声处理-macOS-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 魔方原声处理-macOS-${{ matrix.arch }}
          path: 魔方原声处理-macOS-${{ matrix.arch }}.zip
