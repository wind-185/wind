name: Build Mac App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包 Mac 应用
        run: |
          pyinstaller --noconfirm --clean macos.spec

      - name: 压缩 Mac 应用
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/魔方原声处理.app" "魔方原声处理-macOS.zip"

      - name: 上传打包结果
        uses: actions/upload-artifact@v4
        with:
          name: 魔方原声处理-macOS
          path: 魔方原声处理-macOS.zip
